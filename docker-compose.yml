version: "3.8"

services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - CHROMA_MODE=http
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - PORT=8080
    env_file:
      - ./backend/.env
    depends_on:
      - chroma
    restart: unless-stopped

  ingestion:
    build: ./ingestion_pipeline
    ports:
      - "8001:8001"
    environment:
      - CHROMA_MODE=http
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - INGESTION_PORT=8001
    env_file:
      - ./ingestion_pipeline/.env
    depends_on:
      - chroma
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_TARGET=http://backend:8080
    depends_on:
      - backend

volumes:
  chroma-data:
